<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒溫度計 (Emotion Meter)</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/earlyaccess/cwtexyen.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        main: ['cwTeXYen', 'sans-serif'],
                        sans: ['cwTeXYen', 'PingFang TC', 'Microsoft JhengHei', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'cwTeXYen', sans-serif;
        }
        /* Custom Slider Styles */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 48px;
            width: 48px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        input[type=range]::-moz-range-thumb {
            height: 48px;
            width: 48px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 9999px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icons ---
        const FaceHappy = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full">
                <circle cx="12" cy="12" r="10" />
                <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                <line x1="9" y1="9" x2="9.01" y2="9" />
                <line x1="15" y1="9" x2="15.01" y2="9" />
            </svg>
        );

        const FaceCalm = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full">
                <circle cx="12" cy="12" r="10" />
                <line x1="8" y1="14" x2="16" y2="14" />
                <path d="M9 9h.01" />
                <path d="M15 9h.01" />
            </svg>
        );

        const FaceUnhappy = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full">
                <circle cx="12" cy="12" r="10" />
                <path d="M16 16s-1.5-2-4-2-4 2-4 2" />
                <line x1="9" y1="9" x2="9.01" y2="9" />
                <line x1="15" y1="9" x2="15.01" y2="9" />
            </svg>
        );

        const FaceWorried = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full">
                <circle cx="12" cy="12" r="10" />
                <path d="M16 16s-1.5-2-4-2-4 2-4 2" />
                <circle cx="9" cy="9" r="1" fill="currentColor" />
                <circle cx="15" cy="9" r="1" fill="currentColor" />
                <path d="M7 7.5c.5-1 1.5-1 2.5-1" />
                <path d="M14.5 6.5c1 0 2 .5 2.5 1" />
            </svg>
        );

        const FaceCrying = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full">
                <circle cx="12" cy="12" r="10" />
                <path d="M16 16s-1.5-2-4-2-4 2-4 2" />
                <line x1="9" y1="9" x2="9.01" y2="9" />
                <line x1="15" y1="9" x2="15.01" y2="9" />
                <circle cx="9" cy="11.5" r="0.8" fill="currentColor" stroke="none" />
                <circle cx="9" cy="13.5" r="0.6" fill="currentColor" stroke="none" />
                <circle cx="15" cy="11.5" r="0.8" fill="currentColor" stroke="none" />
                <circle cx="15" cy="13.5" r="0.6" fill="currentColor" stroke="none" />
            </svg>
        );

        const FaceAngry = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full">
                <circle cx="12" cy="12" r="10" />
                <path d="M16 16s-1.5-2-4-2-4 2-4 2" />
                <path d="M7.5 8 10 9" />
                <path d="M16.5 8 14 9" />
                <line x1="9" y1="9" x2="9.01" y2="9" />
                <line x1="15" y1="9" x2="15.01" y2="9" />
            </svg>
        );

        // --- Configuration ---
        const EMOTION_LEVELS = [
            { level: 0, label: "開心", color: "bg-green-400", description: "心情很好，充滿活力！", icon: FaceHappy },
            { level: 20, label: "平靜", color: "bg-teal-400", description: "感覺放鬆，心情平和。", icon: FaceCalm },
            { level: 40, label: "難過/不開心", color: "bg-blue-400", description: "有點失落，提不起勁。", icon: FaceUnhappy },
            { level: 60, label: "擔心", color: "bg-yellow-500", description: "感到焦慮，心裡不安。", icon: FaceWorried },
            { level: 80, label: "傷心", color: "bg-indigo-500", description: "非常難過，想哭。", icon: FaceCrying },
            { level: 100, label: "憤怒", color: "bg-red-600", description: "非常生氣，快要爆炸了！", icon: FaceAngry },
        ];

        function EmotionMeter() {
            const [level, setLevel] = useState(50);

            const currentState = EMOTION_LEVELS.reduce((prev, curr) => {
                return (Math.abs(curr.level - level) < Math.abs(prev.level - level) ? curr : prev);
            });

            const getGradient = (val) => {
                if (val < 15) return 'from-green-400 to-green-200';
                if (val < 35) return 'from-teal-400 to-teal-200';
                if (val < 55) return 'from-blue-400 to-blue-200';
                if (val < 75) return 'from-yellow-400 to-yellow-200';
                if (val < 90) return 'from-indigo-500 to-indigo-300';
                return 'from-red-600 to-red-400';
            };

            const currentGradient = getGradient(level);

            const getSolidColor = (val) => {
                if (val < 15) return '#4ADE80';
                if (val < 35) return '#2DD4BF';
                if (val < 55) return '#60A5FA';
                if (val < 75) return '#EAB308';
                if (val < 90) return '#6366F1';
                return '#DC2626';
            };
            const solidColor = getSolidColor(level);

            return (
                <div className={`min-h-screen w-full flex flex-col items-center justify-center bg-gradient-to-br ${currentGradient} p-4 font-main text-slate-800 relative overflow-hidden transition-all duration-700`}>
                    
                    <style>{`
                        input[type=range]::-webkit-slider-thumb {
                            border: 4px solid ${solidColor};
                        }
                        input[type=range]::-moz-range-thumb {
                            border: 4px solid ${solidColor};
                        }
                    `}</style>

                    <div className="z-10 w-full max-w-[360px] bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl p-6 flex flex-col items-center gap-6 border border-white/50">
                        <h1 className="text-3xl font-bold text-slate-800 tracking-wide">情緒溫度計</h1>
                        
                        <div className="flex flex-row w-full justify-between items-center gap-4">
                            {/* Thermometer */}
                            <div className="relative h-72 w-20 bg-slate-100 rounded-full border-4 border-slate-300 flex flex-col justify-end items-center shadow-inner overflow-hidden shrink-0">
                                <div className="absolute inset-0 z-20 flex flex-col justify-between py-4 pointer-events-none">
                                    {[...Array(11)].map((_, i) => (
                                        <div key={i} className={`w-full h-0.5 ${i % 5 === 0 ? 'bg-slate-400/50 w-1/2 mx-auto' : 'bg-slate-300/50 w-1/3 mx-auto'}`} />
                                    ))}
                                </div>

                                {/* Liquid - using standard style transition instead of motion */}
                                <div 
                                    className="w-full relative z-10"
                                    style={{ 
                                        height: `${level}%`, 
                                        backgroundColor: solidColor,
                                        transition: 'height 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.5s ease'
                                    }}
                                >
                                    <div className="absolute top-0 left-0 w-full h-4 bg-white/30 rounded-t-full" />
                                </div>

                                {/* Bulb */}
                                <div 
                                    className="absolute -bottom-6 w-28 h-28 rounded-full border-4 border-slate-300 z-30 flex items-center justify-center shadow-lg transition-colors duration-500"
                                    style={{ backgroundColor: solidColor }}
                                >
                                    <span className="text-white font-bold text-2xl drop-shadow-md">{level}</span>
                                </div>
                            </div>

                            {/* Controls */}
                            <div className="flex-1 flex flex-col gap-4 items-center text-center min-w-0">
                                <div className="space-y-1 min-h-[150px] flex flex-col justify-center w-full">
                                    <div className="flex flex-col items-center">
                                        <div className="w-28 h-28 mb-3 text-slate-800 drop-shadow-sm transition-colors duration-300" style={{ color: solidColor }}>
                                            <currentState.icon />
                                        </div>
                                        <h2 className="text-xl font-bold transition-colors duration-300 whitespace-nowrap" style={{ color: solidColor }}>{currentState.label}</h2>
                                        <p className="text-slate-600 text-sm font-medium mt-1 leading-tight">{currentState.description}</p>
                                    </div>
                                </div>

                                <div className="w-full space-y-4 pt-2">
                                    <label htmlFor="emotion-slider" className="sr-only">Emotion Level</label>
                                    <div className="relative w-full h-12 flex items-center justify-center">
                                        <input
                                            id="emotion-slider"
                                            type="range"
                                            min="0"
                                            max="100"
                                            value={level}
                                            onChange={(e) => setLevel(Number(e.target.value))}
                                            className="w-full appearance-none bg-transparent focus:outline-none z-20"
                                        />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="w-full pt-4 border-t border-slate-200">
                            <p className="text-sm text-slate-500 text-center font-medium">
                                {level > 80 ? "⚠️ 深呼吸，慢慢數到十。" : 
                                level > 60 ? "💭 找人說說你的煩惱。" : 
                                level > 40 ? "🎵 聽聽音樂，轉換心情。" :
                                level > 20 ? "☕ 享受當下的平靜。" : 
                                "✨ 保持笑容，傳遞快樂！"}
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EmotionMeter />);
    </script>
</body>
</html>
