<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒溫度計 (Emotion Meter)</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/earlyaccess/cwtexyen.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        main: ['cwTeXYen', 'sans-serif'],
                        sans: ['cwTeXYen', 'PingFang TC', 'Microsoft JhengHei', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'cwTeXYen', sans-serif;
        }
        /* Custom Slider Styles */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 56px;
            width: 56px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        input[type=range]::-moz-range-thumb {
            height: 56px;
            width: 56px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 16px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
            border-radius: 9999px;
        }
        input[type=range]::-moz-range-track {
            width: 100%;
            height: 16px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
            border-radius: 9999px;
        }

        /* Tablet Portrait Scaling */
        @media (min-width: 768px) and (orientation: portrait) {
            .main-card-scale {
                transform: scale(1.5);
            }
        }
        @media (min-width: 1024px) and (orientation: portrait) {
            .main-card-scale {
                transform: scale(1.8);
            }
        }

        /* Mobile Landscape Scaling */
        @media (max-height: 450px) and (orientation: landscape) {
            .main-card-scale {
                transform: scale(0.55);
            }
        }
        @media (min-height: 451px) and (max-height: 650px) and (orientation: landscape) {
            .main-card-scale {
                transform: scale(0.75);
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Configuration ---
        const EMOTION_LEVELS = [
            { id: 1, label: "開心", color: "bg-green-400", description: "心情很好，\n充滿活力！" },
            { id: 2, label: "平靜", color: "bg-teal-400", description: "感覺放鬆，\n心情平和。" },
            { id: 3, label: "不安", color: "bg-blue-400", description: "有點不舒服，\n心裡怪怪的。" },
            { id: 4, label: "擔憂", color: "bg-yellow-500", description: "心裡七上八下，\n很煩惱。" },
            { id: 5, label: "傷心", color: "bg-indigo-500", description: "非常難過，\n想哭。" },
            { id: 6, label: "生氣", color: "bg-orange-600", description: "很生氣，\n心跳變快了！" },
            { id: 7, label: "憤怒", color: "bg-red-700", description: "氣炸了，\n快要爆炸了！" },
        ];

        // --- Assets ---
        const LOGO_URL = "https://github.com/epcashadhd/emotionmeter/blob/main/sign.png?raw=true";

        // --- Components ---

        function AbstractIcon({ type, color }) {
            if (type === 'meter') {
                return (
                    <svg viewBox="0 0 100 100" className="w-16 h-16 drop-shadow-sm">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style={{stopColor:'#FFEDD5', stopOpacity:1}} />
                                <stop offset="100%" style={{stopColor:'#FED7AA', stopOpacity:1}} />
                            </linearGradient>
                        </defs>
                        <circle cx="50" cy="50" r="45" fill="url(#grad1)" />
                        <path d="M50 25 V65" stroke="#F97316" strokeWidth="6" strokeLinecap="round" />
                        <circle cx="50" cy="70" r="10" fill="#F97316" />
                        <circle cx="65" cy="35" r="5" fill="#FDBA74" />
                        <circle cx="30" cy="60" r="3" fill="#FDBA74" />
                    </svg>
                );
            }
            if (type === 'search') {
                return (
                    <svg viewBox="0 0 100 100" className="w-16 h-16 drop-shadow-sm">
                         <defs>
                            <linearGradient id="gradSearch" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style={{stopColor:'#DBEAFE', stopOpacity:1}} />
                                <stop offset="100%" style={{stopColor:'#BFDBFE', stopOpacity:1}} />
                            </linearGradient>
                        </defs>
                         <circle cx="50" cy="50" r="45" fill="url(#gradSearch)" />
                         <circle cx="48" cy="48" r="18" stroke="#3B82F6" strokeWidth="5" fill="white" />
                         <line x1="62" y1="62" x2="75" y2="75" stroke="#3B82F6" strokeWidth="7" strokeLinecap="round" />
                         <circle cx="55" cy="40" r="4" fill="#93C5FD" />
                    </svg>
                );
            }
            if (type === 'breath') {
                return (
                    <svg viewBox="0 0 100 100" className="w-16 h-16 drop-shadow-sm">
                        <circle cx="50" cy="50" r="45" fill="#ECFDF5" />
                        <path d="M30 55 Q 50 25 70 55" stroke="#34D399" strokeWidth="4" fill="none" strokeLinecap="round" />
                        <path d="M30 65 Q 50 35 70 65" stroke="#6EE7B7" strokeWidth="4" fill="none" strokeLinecap="round" />
                        <circle cx="50" cy="45" r="2" fill="#34D399" />
                    </svg>
                );
            }
            return null;
        }

        function ReverseArrowIcon() {
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8 text-slate-500">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
            );
        }

        function FloatingLogo({ visible, show }) {
            const [isOpen, setIsOpen] = useState(false);

            if (!visible) return null;

            return (
                <div 
                    className={`fixed bottom-6 right-6 z-50 flex flex-col items-end transition-opacity duration-700 ease-in-out ${show ? 'opacity-100' : 'opacity-0'}`}
                    onMouseLeave={() => setIsOpen(false)}
                >
                    {/* Message Bubble */}
                    <div 
                        className={`mb-2 bg-white px-4 py-2 rounded-xl shadow-lg border border-slate-100 transform transition-all duration-500 ease-out origin-bottom-right ${isOpen ? 'opacity-100 scale-100 translate-y-0' : 'opacity-0 scale-90 translate-y-4 pointer-events-none'}`}
                    >
                        <p className="text-slate-600 font-bold text-sm whitespace-nowrap">本平台由教育心理學家設計</p>
                        {/* Triangle pointer */}
                        <div className="absolute -bottom-1.5 right-6 w-3 h-3 bg-white transform rotate-45 border-r border-b border-slate-100"></div>
                    </div>

                    {/* Logo Button - Transparent & Smaller */}
                    <button 
                        type="button"
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-10 h-10 flex items-center justify-center hover:scale-105 active:scale-95 transition-transform duration-300 focus:outline-none"
                    >
                        <img src={LOGO_URL} alt="Logo" className="w-full h-full object-contain drop-shadow-md" />
                    </button>
                </div>
            );
        }

        function MainMenu({ onNavigate, show }) {
            return (
                <div className={`min-h-screen w-full bg-[#FDFBF7] flex flex-col items-center justify-center p-6 font-main pb-32 transition-opacity duration-700 ease-in-out select-none ${show ? 'opacity-100' : 'opacity-0'}`}>
                    <div className="max-w-md w-full space-y-8">
                        <div className="text-center space-y-2">
                            <h1 className="text-5xl font-bold text-slate-700 tracking-tight mb-2">情緒調控工具</h1>
                            <p className="text-xl text-slate-500">選擇適合你的練習</p>
                        </div>

                        <div className="space-y-4">
                            <button 
                                onClick={() => onNavigate('meter')}
                                className="w-full bg-white hover:bg-orange-50 active:bg-orange-100 border-2 border-orange-100 hover:border-orange-200 p-6 rounded-3xl shadow-sm hover:shadow-md transition-all duration-300 group flex items-center gap-6"
                            >
                                <AbstractIcon type="meter" />
                                <div className="text-left">
                                    <h3 className="text-2xl font-bold text-slate-700 group-hover:text-orange-800 transition-colors">情緒溫度計</h3>
                                    <p className="text-slate-400 mt-1">覺察當下的情緒能量</p>
                                </div>
                            </button>

                            <button 
                                onClick={() => onNavigate('explorer')}
                                className="w-full bg-white hover:bg-blue-50 active:bg-blue-100 border-2 border-blue-100 hover:border-blue-200 p-6 rounded-3xl shadow-sm hover:shadow-md transition-all duration-300 group flex items-center gap-6"
                            >
                                <AbstractIcon type="search" />
                                <div className="text-left">
                                    <h3 className="text-2xl font-bold text-slate-700 group-hover:text-blue-800 transition-colors">情緒探索器</h3>
                                    <p className="text-slate-400 mt-1">辨識你的情緒</p>
                                </div>
                            </button>

                            <button 
                                onClick={() => onNavigate('breathing')}
                                className="w-full bg-white hover:bg-green-50 active:bg-green-100 border-2 border-green-100 hover:border-green-200 p-6 rounded-3xl shadow-sm hover:shadow-md transition-all duration-300 group flex items-center gap-6"
                            >
                                <AbstractIcon type="breath" />
                                <div className="text-left">
                                    <h3 className="text-2xl font-bold text-slate-700 group-hover:text-green-800 transition-colors">呼吸練習</h3>
                                    <p className="text-slate-400 mt-1">調節呼吸，放鬆身心</p>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function BreathingExercise({ onBack, show }) {
            const [exerciseType, setExerciseType] = useState('sphere'); // 'sphere' | 'square' | 'body'
            const [phase, setPhase] = useState('prepare'); // 'prepare' | 'inhale' | 'hold-in' | 'exhale' | 'hold-out'
            const [bubbles, setBubbles] = useState([]);
            const [seconds, setSeconds] = useState(0);
            const [guideText, setGuideText] = useState('準備開始...');
            const startTimeRef = useRef(null);

            // Bubble effect
            useEffect(() => {
                if (phase === 'exhale') {
                    const newBubbles = Array.from({ length: 8 }, (_, i) => ({
                        id: Date.now() + i,
                        angle: Math.random() * 360,
                        distance: 100 + Math.random() * 100,
                        size: 10 + Math.random() * 20,
                        delay: Math.random() * 0.5
                    }));
                    setBubbles(newBubbles);
                    const timer = setTimeout(() => setBubbles([]), 3500);
                    return () => clearTimeout(timer);
                }
            }, [phase]);

            // Timer logic
            useEffect(() => {
                let interval;
                if (exerciseType === 'sphere') {
                    const INHALE_TIME = 4000;
                    const HOLD_TIME = 1000;
                    const EXHALE_TIME = 4000;
                    const TOTAL_CYCLE = INHALE_TIME + HOLD_TIME + EXHALE_TIME + HOLD_TIME;
                    
                    if (phase === 'prepare') {
                        setGuideText('找一個舒適的姿勢坐好，\n準備開始深呼吸練習...');
                        const timer = setTimeout(() => {
                            setPhase('inhale');
                            startTimeRef.current = Date.now();
                        }, 3000);
                        return () => clearTimeout(timer);
                    }

                    const updateTimer = () => {
                        if (!startTimeRef.current) startTimeRef.current = Date.now();
                        const elapsed = Date.now() - startTimeRef.current;
                        const cycleTime = elapsed % TOTAL_CYCLE;

                        let newPhase = phase;
                        let newSeconds = seconds;

                        if (cycleTime < INHALE_TIME) {
                            newPhase = 'inhale';
                            newSeconds = Math.floor(cycleTime / 1000) + 1;
                        } else if (cycleTime < INHALE_TIME + HOLD_TIME) {
                            newPhase = 'hold-in';
                            newSeconds = 4;
                        } else if (cycleTime < INHALE_TIME + HOLD_TIME + EXHALE_TIME) {
                            newPhase = 'exhale';
                            const exhaleProgress = cycleTime - (INHALE_TIME + HOLD_TIME);
                            newSeconds = 4 - Math.floor(exhaleProgress / 1000);
                        } else {
                            newPhase = 'hold-out';
                            newSeconds = 1;
                        }

                        if (newPhase !== phase) {
                            setPhase(newPhase);
                            if (newPhase === 'inhale') {
                                if (navigator.vibrate) navigator.vibrate(50);
                            } else if (newPhase === 'exhale') {
                                if (navigator.vibrate) navigator.vibrate([40, 60, 40]);
                            }
                        }
                        if (newSeconds !== seconds) {
                            setSeconds(newSeconds);
                        }
                    };

                    interval = setInterval(updateTimer, 50);
                    return () => clearInterval(interval);
                }
                return () => clearInterval(interval);
            }, [exerciseType, phase, seconds]);

            const isExpanded = phase === 'inhale' || phase === 'hold-in';

            return (
                <div className={`fixed inset-0 w-full h-full bg-[#FDFBF7] flex flex-col items-center select-none overflow-hidden transition-opacity duration-700 ease-in-out ${show ? 'opacity-100' : 'opacity-0'}`}>
                    {/* Top Bar (Header + Options) */}
                    <div className="w-full p-4 sm:p-6 flex items-center justify-center z-30 relative min-h-[80px] mobile-landscape-topbar">
                        {/* Back Button */}
                        <div className="absolute left-4 sm:left-6 mobile-landscape-header">
                            <button 
                                onClick={onBack}
                                className="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-md border border-slate-100 hover:scale-105 active:scale-95 transition-all duration-300"
                            >
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-slate-600">
                                    <path d="M19 12H5M12 19l-7-7 7-7" />
                                </svg>
                            </button>
                        </div>

                        {/* Option Buttons */}
                        <div className="flex justify-center gap-4 sm:gap-6 z-20 mobile-landscape-options">
                            <button 
                                onClick={() => { setExerciseType('sphere'); setPhase('prepare'); }}
                                className={`w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center transition-all duration-300 shadow-sm border-2 mobile-landscape-btn ${exerciseType === 'sphere' ? 'bg-green-100 border-green-400 scale-110' : 'bg-white border-slate-100 hover:bg-slate-50'}`}
                            >
                                <div className="w-5 h-5 sm:w-6 sm:h-6 rounded-full bg-green-400" />
                            </button>
                            <button 
                                onClick={() => setExerciseType('square')}
                                className={`w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center transition-all duration-300 shadow-sm border-2 mobile-landscape-btn ${exerciseType === 'square' ? 'bg-blue-100 border-blue-400 scale-110' : 'bg-white border-slate-100 hover:bg-slate-50'}`}
                            >
                                <div className="w-5 h-5 sm:w-6 sm:h-6 bg-blue-400" />
                            </button>
                            <button 
                                onClick={() => setExerciseType('body')}
                                className={`w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center transition-all duration-300 shadow-sm border-2 mobile-landscape-btn ${exerciseType === 'body' ? 'bg-orange-100 border-orange-400 scale-110' : 'bg-white border-slate-100 hover:bg-slate-50'}`}
                            >
                                <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5 sm:w-6 sm:h-6 text-orange-400">
                                    <path d="M12 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm0 6c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    {/* Exercise Content */}
                    <div className="flex-1 w-full flex flex-col items-center justify-center relative mobile-landscape-scale">
                        {exerciseType === 'sphere' && (
                            <div className="relative flex flex-col items-center justify-center gap-12 mobile-landscape-compact">
                                {/* Core Sphere */}
                                <div className="relative w-64 h-64 flex items-center justify-center">
                                    <div 
                                        className="w-48 h-48 rounded-full transition-all duration-[4000ms] ease-[cubic-bezier(0.4,0,0.2,1)] relative z-10 flex items-center justify-center"
                                        style={{
                                            backgroundColor: isExpanded ? '#86EFAC' : '#A7F3D0', // Green-300 to Green-200
                                            transform: isExpanded ? 'scale(1.5)' : 'scale(0.75)',
                                            boxShadow: isExpanded ? '0 0 60px 20px rgba(134, 239, 172, 0.6)' : '0 0 0 0 rgba(167, 243, 208, 0)',
                                            opacity: phase === 'prepare' ? 0.8 : 1
                                        }}
                                    >
                                        {phase !== 'prepare' && (
                                            (phase === 'hold-in' || phase === 'hold-out') ? (
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-16 h-16 text-white drop-shadow-md animate-[fadeInUp_0.5s_ease-out]">
                                                    <circle cx="12" cy="12" r="10" />
                                                    <line x1="10" y1="15" x2="10" y2="9" />
                                                    <line x1="14" y1="15" x2="14" y2="9" />
                                                </svg>
                                            ) : (
                                                <span 
                                                    key={seconds} 
                                                    className="text-5xl font-bold text-white drop-shadow-md font-mono animate-[fadeInUp_0.5s_ease-out]"
                                                >
                                                    {seconds}
                                                </span>
                                            )
                                        )}
                                    </div>

                                    {/* Bubbles */}
                                    {phase === 'exhale' && bubbles.map(bubble => (
                                        <div
                                            key={bubble.id}
                                            className="absolute rounded-full bg-[#A7F3D0]/60 pointer-events-none"
                                            style={{
                                                width: bubble.size,
                                                height: bubble.size,
                                                left: '50%',
                                                top: '50%',
                                                transform: `translate(-50%, -50%) rotate(${bubble.angle}deg) translateX(${bubble.distance}px)`,
                                                opacity: 0,
                                                transition: `transform 3s ease-out ${bubble.delay}s, opacity 3s ease-out ${bubble.delay}s`,
                                                animation: `bubbleFloat 3s ease-out ${bubble.delay}s forwards`
                                            }}
                                        />
                                    ))}
                                </div>

                                {/* Instruction Text */}
                                <div className="text-center h-32 flex flex-col items-center justify-center gap-3 w-full relative">
                                    <p className={`absolute text-2xl text-slate-500 font-medium whitespace-pre-line leading-relaxed transition-opacity duration-500 ${phase === 'prepare' ? 'opacity-100 animate-pulse' : 'opacity-0 pointer-events-none'}`}>
                                        {guideText}
                                    </p>

                                    <div className={`relative flex items-center justify-center w-full transition-opacity duration-500 ${phase === 'prepare' ? 'opacity-0' : 'opacity-100'}`}>
                                        {/* Left Wind Logo (Inhale) */}
                                        <div className="absolute right-[calc(50%+90px)] w-24 h-24 flex items-center justify-center pointer-events-none">
                                            <img 
                                                src="https://github.com/epcashadhd/emotionmeter/blob/main/breath1.png?raw=true" 
                                                alt="Wind Inhale"
                                                className={`w-full h-full object-contain transition-all ease-out transform ${
                                                    phase === 'inhale' 
                                                        ? 'opacity-100 scale-100 translate-x-24 duration-[4000ms]' 
                                                        : phase === 'hold-in'
                                                            ? 'opacity-0 scale-100 translate-x-24 duration-1000'
                                                            : 'opacity-0 scale-50 -translate-x-12 duration-0'
                                                }`}
                                            />
                                        </div>

                                        {/* Center Text */}
                                        <div className="flex flex-col items-center z-10 min-w-[160px]">
                                            <h2 className={`text-6xl font-bold text-slate-700 transition-all duration-1000 ease-in-out ${isExpanded ? 'opacity-100 transform translate-y-0' : 'opacity-30 transform -translate-y-2'}`}>
                                                {isExpanded ? '吸氣' : '呼氣'}
                                            </h2>
                                            <p className={`text-2xl text-slate-400 font-medium tracking-widest transition-all duration-1000 ease-in-out ${isExpanded ? 'opacity-100' : 'opacity-60'}`}>
                                                {isExpanded ? 'INHALE' : 'EXHALE'}
                                            </p>
                                        </div>

                                        {/* Right Wind Logo (Exhale) */}
                                        <div className="absolute left-[calc(50%+90px)] w-24 h-24 flex items-center justify-center pointer-events-none">
                                            <img 
                                                src="https://github.com/epcashadhd/emotionmeter/blob/main/breath1.png?raw=true" 
                                                alt="Wind Exhale"
                                                className={`w-full h-full object-contain transition-all ease-out transform ${
                                                    phase === 'exhale' 
                                                        ? 'opacity-100 scale-100 -translate-x-4 duration-[4000ms]' 
                                                        : phase === 'hold-out'
                                                            ? 'opacity-0 scale-100 -translate-x-4 duration-1000'
                                                            : 'opacity-0 scale-50 -translate-x-32 duration-0'
                                                }`}
                                            />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <style>{`
                        @keyframes bubbleFloat {
                            0% {
                                opacity: 0.8;
                                transform: translate(-50%, -50%) rotate(var(--angle)) translateX(60px);
                            }
                            100% {
                                opacity: 0;
                                transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--distance));
                            }
                        }

                        /* Mobile Landscape Optimization */
                        @media (max-height: 500px) and (orientation: landscape) {
                            .mobile-landscape-topbar {
                                min-height: 0 !important;
                                padding: 0 !important;
                            }
                            .mobile-landscape-scale {
                                transform: scale(0.65);
                                transform-origin: center center;
                                margin-top: -40px !important;
                            }
                            .mobile-landscape-compact {
                                margin-top: -10px !important;
                                gap: 1rem !important;
                            }
                            .mobile-landscape-btn {
                                width: 2.5rem !important;
                                height: 2.5rem !important;
                            }
                            .mobile-landscape-btn svg, .mobile-landscape-btn div {
                                width: 1.25rem !important;
                                height: 1.25rem !important;
                            }
                            .mobile-landscape-header {
                                padding: 0.5rem !important;
                                position: absolute !important;
                                top: 0;
                                left: 0;

        function EmotionWritingView({ emotion, onBack, onHome, show }) {
            const [mode, setMode] = useState(null); // 'draw', 'type', 'erase', null
            const [text, setText] = useState('');
            const [meterLevel, setMeterLevel] = useState(1);
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [isDraggingMeter, setIsDraggingMeter] = useState(false);
            const [eraserSize, setEraserSize] = useState(20); // 20: Medium, 40: Big
            const [cursorPos, setCursorPos] = useState({ x: 0, y: 0 });
            const [hasDrawn, setHasDrawn] = useState(false);
            const trackRef = useRef(null);
            
            // Enlargement Logic
            const [enlargedEmotion, setEnlargedEmotion] = useState(null);
            const [isEnlargedVisible, setIsEnlargedVisible] = useState(false);
            const [layoutMode, setLayoutMode] = useState('desktop');

            useEffect(() => {
                const checkLayout = () => {
                    const width = window.innerWidth;
                    const height = window.innerHeight;
                    const isLandscape = width > height;

                    if (isLandscape && height <= 500) {
                        setLayoutMode('mobile-landscape');
                    } else if (!isLandscape && width <= 600) {
                        setLayoutMode('mobile-portrait');
                    } else if (!isLandscape && width <= 1024) {
                        setLayoutMode('tablet-portrait');
                    } else {
                        setLayoutMode('desktop');
                    }
                };
                
                checkLayout();
                window.addEventListener('resize', checkLayout);
                return () => window.removeEventListener('resize', checkLayout);
            }, []);

            const handleEnlarge = (e, emotion) => {
                e.stopPropagation();
                setEnlargedEmotion(emotion);
                setTimeout(() => setIsEnlargedVisible(true), 10);
            };

            const closeEnlarged = (e) => {
                if (e) e.stopPropagation();
                setIsEnlargedVisible(false);
                setTimeout(() => setEnlargedEmotion(null), 700);
            };

            useEffect(() => {
                if (!enlargedEmotion) return;
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        closeEnlarged();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [enlargedEmotion]);

            const handleMeterPointerDown = (e) => {
                setMode(null); // Deselect writing/drawing mode
                setIsDraggingMeter(true);
                e.target.setPointerCapture(e.pointerId);
                updateMeterLevel(e);
            };

            const handleMeterPointerMove = (e) => {
                if (isDraggingMeter) {
                    updateMeterLevel(e);
                }
            };

            const handleMeterPointerUp = (e) => {
                setIsDraggingMeter(false);
                e.target.releasePointerCapture(e.pointerId);
            };

            const updateMeterLevel = (e) => {
                if (!trackRef.current) return;
                const rect = trackRef.current.getBoundingClientRect();
                const clientY = e.clientY;
                const height = rect.bottom - clientY;
                const percentage = Math.max(0, Math.min(1, height / rect.height));
                const newLevel = Math.max(1, Math.min(7, Math.ceil(percentage * 7)));
                setMeterLevel(newLevel);
            };
            
            // Canvas Logic
            useEffect(() => {
                const canvas = canvasRef.current;
                if (canvas) {
                    const initCanvas = () => {
                        // Set canvas size to match display size
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                    };

                    initCanvas();
                    // Re-init after a short delay to ensure layout is stable (e.g. after transitions)
                    setTimeout(initCanvas, 100);
                }
            }, []);

            // Handle resize
            useEffect(() => {
                const handleResize = () => {
                    const canvas = canvasRef.current;
                    if (canvas) {
                        // Save current content
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = canvas.width;
                        tempCanvas.height = canvas.height;
                        tempCanvas.getContext('2d').drawImage(canvas, 0, 0);
                        
                        // Resize
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        
                        // Restore content
                        const ctx = canvas.getContext('2d');
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.drawImage(tempCanvas, 0, 0);
                    }
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const startDrawing = (e) => {
                if (mode !== 'draw' && mode !== 'erase') return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || e.touches[0].clientX;
                const clientY = e.clientY || e.touches[0].clientY;
                const x = clientX - rect.left;
                const y = clientY - rect.top;
                
                setCursorPos({ x, y });

                ctx.beginPath();
                ctx.moveTo(x, y);
                
                // Set style based on mode
                if (mode === 'erase') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = eraserSize;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#334155';
                }

                setIsDrawing(true);
            };

                if (!isDrawing || (mode !== 'draw' && mode !== 'erase')) return;
                // Only prevent default if we are drawing to avoid scrolling
                if (e.cancelable) e.preventDefault(); 
                
                if (!hasDrawn) setHasDrawn(true);

                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || e.touches[0].clientX;
                const clientY = e.clientY || e.touches[0].clientY;
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                setCursorPos({ x, y });

                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                setIsDrawing(false);
            };

            const clearAll = () => {
                const canvas = canvasRef.current;

                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-slate-600">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                <polyline points="9 22 9 12 15 12 15 22"></polyline>

                                >
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 sm:w-6 sm:h-6">
                                        <path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                                    </svg>
                                </button>
                                <button 
                                    onClick={() => toggleMode('type')}
                                    className={`w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center shadow-md transition-all ${mode === 'type' ? 'bg-orange-500 text-white scale-110' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
                                    title="Type"
                                >
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 sm:w-6 sm:h-6">
                                        <rect x="2" y="4" width="20" height="16" rx="2" /><path d="M6 8h.001" /><path d="M10 8h.001" /><path d="M14 8h.001" /><path d="M18 8h.001" /><path d="M6 12h.001" /><path d="M10 12h.001" /><path d="M14 12h.001" /><path d="M18 12h.001" /><path d="M7 16h10" />
                                    </svg>
                                </button>
                                
                                <div className="relative flex flex-col items-center">
                                    <button 
                                        onClick={() => toggleMode('erase')}
                                        className={`w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center shadow-md transition-all ${mode === 'erase' ? 'bg-orange-500 text-white scale-110' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
                                        title="Eraser"
                                    >
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 sm:w-6 sm:h-6">
                                            <path d="M18 13l-5-5L3 18h10l5-5z" fill={mode === 'erase' ? 'white' : 'currentColor'} stroke="none" />
                                            <path d="M15 6l3 3 3-3-3-3-3 3z" stroke={mode === 'erase' ? 'white' : 'currentColor'} />
                                            <path d="M18 13l-5-5L3 18h10l5-5z" stroke={mode === 'erase' ? 'white' : 'currentColor'} fill="none" />
                                        </svg>
                                    </button>
                                    
                                    {mode === 'erase' && !isDrawing && (
                                        <div className="absolute top-full mt-2 flex flex-col gap-2 bg-white p-1.5 rounded-xl shadow-md border border-slate-100 animate-in slide-in-from-top-2 fade-in duration-200 z-30">
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); setEraserSize(20); }}
                                                className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${eraserSize === 20 ? 'border-orange-500 bg-orange-50' : 'border-slate-200 hover:border-slate-300'}`}
                                                title="Medium Eraser"
                                            >
                                                <div className="w-3 h-3 bg-slate-600 rounded-full" />
                                            </button>
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); setEraserSize(40); }}
                                                className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${eraserSize === 40 ? 'border-orange-500 bg-orange-50' : 'border-slate-200 hover:border-slate-300'}`}
                                                title="Big Eraser"
                                            >
                                                <div className="w-5 h-5 bg-slate-600 rounded-full" />
                                            </button>
                                        </div>
                                    )}
                                </div>

                                <button 
                                    onClick={clearAll}
                                    className="w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center bg-white text-slate-500 shadow-md hover:bg-red-50 hover:text-red-500 transition-all"
                                    title="Clear All"
                                >
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 sm:w-6 sm:h-6">
                                        <polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                    </svg>
                                </button>
                            </div>

                            {/* Canvas Layer */}
                            <canvas
                                ref={canvasRef}
                                className={`absolute inset-0 w-full h-full touch-none ${mode === 'draw' || mode === 'erase' ? 'z-10' : 'z-0 pointer-events-none'}`}
                                style={{ cursor: getCursorStyle() }}
                                onMouseDown={startDrawing}
                                onMouseMove={draw}
                                onMouseUp={stopDrawing}
                                onMouseLeave={stopDrawing}
                                onTouchStart={startDrawing}
                                onTouchMove={draw}
                                onTouchEnd={stopDrawing}
                            />

                            {/* Custom Eraser Cursor for Touch */}
                            {mode === 'erase' && isDrawing && (
                                <div 
                                    className="absolute rounded-full border-2 border-slate-600 bg-white/50 pointer-events-none z-50"
                                    style={{
                                        width: eraserSize,
                                        height: eraserSize,
                                        left: cursorPos.x,
                                        top: cursorPos.y,
                                        transform: 'translate(-50%, -50%)'
                                    }}
                                />
                            )}

                            {/* Textarea Layer */}
                            <textarea
                                value={text}
                                onChange={(e) => setText(e.target.value)}
                                placeholder={hasDrawn ? "" : "在這裡寫下你的想法..."}
                                className={`absolute inset-0 w-full h-full bg-transparent p-4 pt-20 pr-4 landscape:pt-6 landscape:pr-44 sm:p-6 sm:pt-24 sm:pr-12 sm:landscape:pt-8 sm:landscape:pr-56 text-base sm:text-xl leading-relaxed resize-none focus:outline-none select-text ${mode === 'type' ? 'z-10' : 'z-0 pointer-events-none opacity-50'}`}
                            />
                        </div>
                    </div>

                    {/* Enlarged Emotion Modal */}
                    {enlargedEmotion && (
                        <div 
                            className={`fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity duration-700 ease-in-out ${isEnlargedVisible ? 'opacity-100' : 'opacity-0'}`}
                            onClick={closeEnlarged}
                        >
                            <div 
                                className={`relative bg-white rounded-3xl shadow-2xl p-6 flex items-center gap-4 transition-all duration-700 ease-out transform 
                                ${isEnlargedVisible ? 'scale-100 opacity-100' : 'scale-90 opacity-0'}
                                ${layoutMode === 'mobile-landscape' 
                                    ? 'w-[90vw] max-w-3xl h-[85vh] flex-row gap-8 p-4' 
                                    : 'w-[90vw] max-w-lg max-h-[85vh] flex-col'
                                }`}
                                onClick={(e) => e.stopPropagation()}
                            >
                                {/* Image Container - Flexible height */}
                                <div className={`flex-1 min-h-0 flex items-center justify-center ${layoutMode === 'mobile-landscape' ? 'w-1/2 h-full justify-end' : 'w-full'}`}>
                                    <img 
                                        src={`https://github.com/epcashadhd/emotionmeter/blob/main/${enlargedEmotion.type}${enlargedEmotion.index}.png?raw=true`}
                                        alt="Enlarged Emotion"
                                        className="max-w-full max-h-full object-contain drop-shadow-md"
                                        referrerPolicy="no-referrer"
                                    />
                                </div>

                                {/* Definition Text */}
                                {EMOTION_DEFINITIONS[enlargedEmotion.id] && (
                                    <div className={`shrink-0 ${layoutMode === 'mobile-landscape' ? 'w-1/2 flex items-center text-left' : 'w-full text-center'}`}>
                                        <p className="text-slate-600 text-xl font-medium leading-relaxed whitespace-pre-wrap">
                                            {EMOTION_DEFINITIONS[enlargedEmotion.id].desc}
                                        </p>
                                    </div>
                                )}

                                <button 
                                    className="absolute top-4 right-4 w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center hover:bg-slate-200 transition-colors shadow-sm z-10"
                                    onClick={closeEnlarged}
                                >
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 text-slate-600">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function EmotionExplorerTool({ onBack, show }) {
            const [selectedEmotion, setSelectedEmotion] = useState(null);
            const [enlargedEmotion, setEnlargedEmotion] = useState(null);
            const [isEnlargedVisible, setIsEnlargedVisible] = useState(false);
            const [layoutMode, setLayoutMode] = useState('desktop'); // 'mobile-portrait', 'mobile-landscape', 'tablet-portrait', 'desktop'
            const [step, setStep] = useState('select'); // 'select' | 'write'
            const [isTransitioning, setIsTransitioning] = useState(false);

            // Derived show state for children to handle internal transitions
            const contentShow = show && !isTransitioning;

            useEffect(() => {
                const checkLayout = () => {
                    const width = window.innerWidth;
                    const height = window.innerHeight;
                    const isLandscape = width > height;

                    if (isLandscape && height <= 500) {
                        setLayoutMode('mobile-landscape');
                    } else if (!isLandscape && width <= 600) {
                        setLayoutMode('mobile-portrait');
                    } else if (!isLandscape && width <= 1024) {
                        setLayoutMode('tablet-portrait');
                    } else {
                        setLayoutMode('desktop');
                    }
                };
                
                checkLayout();
                window.addEventListener('resize', checkLayout);
                return () => window.removeEventListener('resize', checkLayout);
            }, []);

            // Data generation
            const positiveEmotions = Array.from({ length: 13 }, (_, i) => ({ id: `p${i+1}`, type: 'positive', index: i + 1 }));
            const negativeEmotions = Array.from({ length: 13 }, (_, i) => ({ id: `n${i+1}`, type: 'negative', index: i + 1 }));

            let rows = [];
            const isPortrait = layoutMode === 'mobile-portrait' || layoutMode === 'tablet-portrait';

            if (isPortrait) {
                // Mobile Portrait / Tablet Portrait: 3, 2, 3, 2, 3 pattern (Total 13)
                rows = [
                    positiveEmotions.slice(0, 3),
                    positiveEmotions.slice(3, 5),
                    positiveEmotions.slice(5, 8),
                    positiveEmotions.slice(8, 10),
                    positiveEmotions.slice(10, 13),
                    negativeEmotions.slice(0, 3),
                    negativeEmotions.slice(3, 5),
                    negativeEmotions.slice(5, 8),
                    negativeEmotions.slice(8, 10),
                    negativeEmotions.slice(10, 13)
                ];
            } else {
                // Desktop / Mobile Landscape: 7, 6 pattern
                rows = [
                    positiveEmotions.slice(0, 7),
                    positiveEmotions.slice(7, 13),
                    negativeEmotions.slice(0, 7),
                    negativeEmotions.slice(7, 13)
                ];
            }

            const getSizeClass = () => {
                switch(layoutMode) {
                    case 'mobile-landscape': return 'w-32 h-32';
                    case 'tablet-portrait': return 'w-52 h-52 sm:w-60 sm:h-60';
                    case 'mobile-portrait': return 'w-24 h-24 sm:w-32 sm:h-32';
                    default: return 'w-20 h-20 sm:w-24 sm:h-24 md:w-32 md:h-32 xl:w-36 xl:h-36 2xl:w-40 2xl:h-40';
                }
            };

            const handleEmotionClick = (e, id) => {
                e.stopPropagation();
                if (selectedEmotion === id) {
                    // Find the emotion object to enlarge
                    const allEmotions = [...positiveEmotions, ...negativeEmotions];
                    const emotion = allEmotions.find(e => e.id === id);
                    setEnlargedEmotion(emotion);
                    // Small delay to allow render before transition
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            setIsEnlargedVisible(true);
                        });
                    });
                } else {
                    setSelectedEmotion(id);
                }
            };

            const closeEnlarged = (e) => {
                if (e) e.stopPropagation();
                setIsEnlargedVisible(false);
                setTimeout(() => {
                    setEnlargedEmotion(null);
                }, 700); // Match duration
            };

            useEffect(() => {
                if (!enlargedEmotion) return;
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        closeEnlarged();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [enlargedEmotion]);

            const handleNext = (e) => {
                e.stopPropagation();
                if (selectedEmotion) {
                    setIsTransitioning(true);
                    setTimeout(() => {
                        setStep('write');
                        // Small delay to ensure render before fading in
                        setTimeout(() => setIsTransitioning(false), 50);
                    }, 700);
                }
            };

            const handleBackFromWriting = () => {
                setIsTransitioning(true);
                setTimeout(() => {
                    setStep('select');
                    setTimeout(() => setIsTransitioning(false), 50);
                }, 700);
            };

            // Find selected emotion data
            const allEmotions = [...positiveEmotions, ...negativeEmotions];
            const selectedEmotionData = allEmotions.find(e => e.id === selectedEmotion);

            if (step === 'write' && selectedEmotionData) {
                return (
                    <EmotionWritingView 
                        emotion={selectedEmotionData} 
                        onBack={handleBackFromWriting}
                        onHome={onBack}
                        show={contentShow}
                    />
                );
            }

            let globalIndex = 0;

            return (
                <div 
                    className={`fixed inset-0 w-full h-full bg-[#FDFBF7] flex flex-col transition-opacity duration-700 ease-in-out select-none ${contentShow ? 'opacity-100' : 'opacity-0'}`}
                    onClick={() => setSelectedEmotion(null)}
                >
                    {/* Header */}
                    <div className="w-full p-2 flex justify-between items-center z-20 shrink-0 bg-[#FDFBF7]/95 backdrop-blur-sm shadow-sm">
                        {/* Home Button (Top Left) */}
                        <button 
                            onClick={(e) => { e.stopPropagation(); onBack(); }}
                            className="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-md border border-slate-100 hover:scale-105 active:scale-95 transition-all duration-300"
                        >
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-slate-600">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                <polyline points="9 22 9 12 15 12 15 22"></polyline>
                            </svg>
                        </button>

                        <h1 className="text-xl md:text-2xl font-bold text-slate-700 tracking-tight">情緒探索器</h1>

                        {/* Next Button (Top Right) */}
                        <div className="w-10 h-10 relative">
                            <button 
                                onClick={handleNext}
                                className={`absolute inset-0 w-full h-full flex items-center justify-center bg-orange-500 rounded-full shadow-md border-2 border-orange-400 hover:bg-orange-600 transition-all duration-500 transform ${selectedEmotion ? 'opacity-100 scale-100 rotate-0' : 'opacity-0 scale-50 rotate-180 pointer-events-none'}`}
                            >
                                <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                    <polyline points="12 5 19 12 12 19"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>

                    {/* Content */}
                    <div className="flex-1 flex flex-col items-center gap-2 sm:gap-3 p-2 overflow-y-auto pb-4 pt-4">
                        {rows.map((row, rowIndex) => (
                            <div key={rowIndex} className={`flex flex-wrap justify-center gap-2 sm:gap-4 xl:gap-6 ${(!isPortrait && rowIndex === 1) || (isPortrait && rowIndex === 4) ? 'mb-4 sm:mb-6' : ''}`}>
                                {row.map((emotion) => {
                                    const delay = 100 + (globalIndex * 40); // Staggered delay
                                    globalIndex++;
                                    
                                    return (
                                        <button
                                            key={emotion.id}
                                            onClick={(e) => handleEmotionClick(e, emotion.id)}
                                            style={{
                                                animation: `fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards`,
                                                animationDelay: `${delay}ms`,
                                                opacity: 0 // Start invisible
                                            }}
                                            className={`relative group transition-all duration-300 ${
                                                selectedEmotion === emotion.id 
                                                    ? 'scale-110 z-10' 
                                                    : 'hover:scale-105 opacity-90 hover:opacity-100'
                                            }`}
                                        >
                                            <div className={`${getSizeClass()} rounded-2xl bg-white shadow-sm border-2 flex items-center justify-center overflow-hidden transition-all duration-300 ${
                                                selectedEmotion === emotion.id 
                                                    ? 'border-orange-400 shadow-orange-200 shadow-xl ring-4 ring-orange-100' 
                                                    : 'border-slate-100 group-hover:border-orange-200'
                                            }`}>
                                                <img 
                                                    src={`https://github.com/epcashadhd/emotionmeter/blob/main/${emotion.type}${emotion.index}.png?raw=true`}
                                                    alt={`${emotion.type} ${emotion.index}`}
                                                    className="w-[90%] h-[90%] object-contain"
                                                    referrerPolicy="no-referrer"
                                                />
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        ))}
                    </div>

                    {/* Enlarged Emotion Modal */}
                    {enlargedEmotion && (
                        <div 
                            className={`fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity duration-700 ease-in-out ${isEnlargedVisible ? 'opacity-100' : 'opacity-0'}`}
                            onClick={closeEnlarged}
                        >
                            <div 
                                className={`relative bg-white rounded-3xl shadow-2xl p-6 flex items-center gap-4 transition-all duration-700 ease-out transform 
                                ${isEnlargedVisible ? 'scale-100 opacity-100' : 'scale-90 opacity-0'}
                                ${layoutMode === 'mobile-landscape' 
                                    ? 'w-[90vw] max-w-3xl h-[85vh] flex-row gap-8 p-4' 
                                    : 'w-[90vw] max-w-lg max-h-[85vh] flex-col'
                                }`}
                                onClick={(e) => e.stopPropagation()}
                            >
                                {/* Image Container - Flexible height */}
                                <div className={`flex-1 min-h-0 flex items-center justify-center ${layoutMode === 'mobile-landscape' ? 'w-1/2 h-full justify-end' : 'w-full'}`}>
                                    <img 
                                        src={`https://github.com/epcashadhd/emotionmeter/blob/main/${enlargedEmotion.type}${enlargedEmotion.index}.png?raw=true`}
                                        alt="Enlarged Emotion"
                                        className="max-w-full max-h-full object-contain drop-shadow-md"
                                        referrerPolicy="no-referrer"
                                    />
                                </div>

                                {/* Definition Text */}
                                {EMOTION_DEFINITIONS[enlargedEmotion.id] && (
                                    <div className={`shrink-0 ${layoutMode === 'mobile-landscape' ? 'w-1/2 flex items-center text-left' : 'w-full text-center'}`}>
                                        <p className="text-slate-600 text-xl font-medium leading-relaxed whitespace-pre-wrap">
                                            {EMOTION_DEFINITIONS[enlargedEmotion.id].desc}
                                        </p>
                                    </div>
                                )}

                                <button 
                                    className="absolute top-4 right-4 w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center hover:bg-slate-200 transition-colors shadow-sm z-10"
                                    onClick={closeEnlarged}
                                >
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 text-slate-600">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('menu'); // 'menu' or 'meter'
            const [transitionState, setTransitionState] = useState('idle'); // 'idle', 'fading-out', 'mounting', 'fading-in'

            // Preload images for smoother experience
            useEffect(() => {
                const preloadImages = async () => {
                    const imageUrls = [
                        LOGO_URL,
                        // Basic emotions (1-7)
                        ...Array.from({ length: 7 }, (_, i) => `https://github.com/epcashadhd/emotionmeter/blob/main/basic${i+1}.png?raw=true`),
                        // Positive emotions (1-13)
                        ...Array.from({ length: 13 }, (_, i) => `https://github.com/epcashadhd/emotionmeter/blob/main/positive${i+1}.png?raw=true`),
                        // Negative emotions (1-13)
                        ...Array.from({ length: 13 }, (_, i) => `https://github.com/epcashadhd/emotionmeter/blob/main/negative${i+1}.png?raw=true`)
                    ];

                    imageUrls.forEach(url => {
                        const img = new Image();
                        img.src = url;
                    });
                };
                
                // Start preloading after a short delay to allow initial render
                const timer = setTimeout(preloadImages, 1000);
                return () => clearTimeout(timer);
            }, []);

            const handleNavigate = (target) => {
                setTransitionState('fading-out');
                setTimeout(() => {
                    setView(target);
                    setTransitionState('mounting');
                    
                    // Small delay to ensure mount happens before fade-in starts
                    setTimeout(() => {
                        setTransitionState('fading-in');
                        setTimeout(() => {
                            setTransitionState('idle');
                        }, 700); // Match fade-in duration
                    }, 50);
                }, 700); // Match fade-out duration
            };

            const show = transitionState === 'idle' || transitionState === 'fading-in';

            return (
                <React.Fragment>
                    {view === 'menu' && (
                        <MainMenu 
                            onNavigate={handleNavigate} 
                            show={show} 
                        />
                    )}
                    
                    {view === 'meter' && (
                        <EmotionMeterTool 
                            onBack={() => handleNavigate('menu')} 
                            show={show}
                        />
                    )}

                    {view === 'explorer' && (
                        <EmotionExplorerTool 
                            onBack={() => handleNavigate('menu')} 
                            show={show}
                        />
                    )}

                    {view === 'breathing' && (
                        <BreathingExercise 
                            onBack={() => handleNavigate('menu')} 
                            show={show}
                        />
                    )}
                    
                    {/* Floating logo only on menu */}
                    <FloatingLogo visible={view === 'menu'} show={show} />
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
