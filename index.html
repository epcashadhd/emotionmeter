
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒溫度計 (Emotion Meter)</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/earlyaccess/cwtexyen.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        main: ['cwTeXYen', 'sans-serif'],
                        sans: ['cwTeXYen', 'PingFang TC', 'Microsoft JhengHei', 'sans-serif'],

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'cwTeXYen', sans-serif;
        }
        /* Custom Slider Styles */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 56px;
            width: 56px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        input[type=range]::-moz-range-thumb {
            height: 56px;
            width: 56px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 16px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
            border-radius: 9999px;
        }
        input[type=range]::-moz-range-track {
            width: 100%;
            height: 16px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
            border-radius: 9999px;
        }

        /* Tablet Portrait Scaling */
        @media (min-width: 768px) and (orientation: portrait) {
            .main-card-scale {
                transform: scale(1.5);
            }
        }
        @media (min-width: 1024px) and (orientation: portrait) {
            .main-card-scale {
                transform: scale(1.8);
            }
        }

        /* Mobile Landscape Scaling */
        @media (max-height: 450px) and (orientation: landscape) {
            .main-card-scale {
                transform: scale(0.55);
            }
        }
        @media (min-height: 451px) and (max-height: 650px) and (orientation: landscape) {
            .main-card-scale {
                transform: scale(0.75);
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);

        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Configuration ---
        const EMOTION_LEVELS = [
            { id: 1, label: "開心", color: "bg-green-400", description: "心情很好，\n充滿活力！" },
            { id: 2, label: "平靜", color: "bg-teal-400", description: "感覺放鬆，\n心情平和。" },
            { id: 3, label: "不安", color: "bg-blue-400", description: "有點不舒服，\n心裡怪怪的。" },
            { id: 4, label: "擔憂", color: "bg-yellow-500", description: "心裡七上八下，\n很煩惱。" },
            { id: 5, label: "傷心", color: "bg-indigo-500", description: "非常難過，\n想哭。" },
            { id: 6, label: "生氣", color: "bg-orange-600", description: "很生氣，\n心跳變快了！" },
            { id: 7, label: "憤怒", color: "bg-red-700", description: "氣炸了，\n快要爆炸了！" },
        ];

        // --- Assets ---
        const LOGO_URL = "https://github.com/epcashadhd/emotionmeter/blob/main/sign.png?raw=true";

        // --- Components ---

        function AbstractIcon({ type, color }) {
            if (type === 'meter') {
                return (
                    <svg viewBox="0 0 100 100" className="w-16 h-16 drop-shadow-sm">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style={{stopColor:'#FFEDD5', stopOpacity:1}} />
                                <stop offset="100%" style={{stopColor:'#FED7AA', stopOpacity:1}} />
                            </linearGradient>
                        </defs>
                        <circle cx="50" cy="50" r="45" fill="url(#grad1)" />
                        <path d="M50 25 V65" stroke="#F97316" strokeWidth="6" strokeLinecap="round" />
                        <circle cx="50" cy="70" r="10" fill="#F97316" />
                        <circle cx="65" cy="35" r="5" fill="#FDBA74" />
                        <circle cx="30" cy="60" r="3" fill="#FDBA74" />
                    </svg>
                );
            }
            if (type === 'search') {
                return (
                    <svg viewBox="0 0 100 100" className="w-16 h-16 drop-shadow-sm">
                         <defs>
                            <linearGradient id="gradSearch" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style={{stopColor:'#FFEDD5', stopOpacity:1}} />
                                <stop offset="100%" style={{stopColor:'#FED7AA', stopOpacity:1}} />
                            </linearGradient>
                        </defs>
                         <circle cx="50" cy="50" r="45" fill="url(#gradSearch)" />
                         <circle cx="48" cy="48" r="18" stroke="#F97316" strokeWidth="5" fill="white" />
                         <line x1="62" y1="62" x2="75" y2="75" stroke="#F97316" strokeWidth="7" strokeLinecap="round" />
                         <circle cx="55" cy="40" r="4" fill="#FDBA74" />
                    </svg>
                );
            }
            if (type === 'breath') {
                return (
                    <svg viewBox="0 0 100 100" className="w-16 h-16 drop-shadow-sm opacity-60">
                        <circle cx="50" cy="50" r="45" fill="#F1F5F9" />
                        <path d="M30 55 Q 50 25 70 55" stroke="#94A3B8" strokeWidth="4" fill="none" strokeLinecap="round" />
                        <path d="M30 65 Q 50 35 70 65" stroke="#CBD5E1" strokeWidth="4" fill="none" strokeLinecap="round" />
                        <circle cx="50" cy="45" r="2" fill="#94A3B8" />
                    </svg>
                );
            }
            return null;
        }

        function ReverseArrowIcon() {
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8 text-slate-500">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
            );
        }

        function FloatingLogo({ visible, show }) {
            const [isOpen, setIsOpen] = useState(false);

            if (!visible) return null;

            return (
                <div 
                    className={`fixed bottom-6 right-6 z-50 flex flex-col items-end transition-opacity duration-700 ease-in-out ${show ? 'opacity-100' : 'opacity-0'}`}
                    onMouseLeave={() => setIsOpen(false)}
                >
                    {/* Message Bubble */}
                    <div 
                        className={`mb-2 bg-white px-4 py-2 rounded-xl shadow-lg border border-slate-100 transform transition-all duration-500 ease-out origin-bottom-right ${isOpen ? 'opacity-100 scale-100 translate-y-0' : 'opacity-0 scale-90 translate-y-4 pointer-events-none'}`}
                    >
                        <p className="text-slate-600 font-bold text-sm whitespace-nowrap">本平台由教育心理學家設計</p>
                        {/* Triangle pointer */}
                        <div className="absolute -bottom-1.5 right-6 w-3 h-3 bg-white transform rotate-45 border-r border-b border-slate-100"></div>
                    </div>

                    {/* Logo Button - Transparent & Smaller */}
                    <button 
                        type="button"
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-10 h-10 flex items-center justify-center hover:scale-105 active:scale-95 transition-transform duration-300 focus:outline-none"
                    >
                        <img src={LOGO_URL} alt="Logo" className="w-full h-full object-contain drop-shadow-md" />
                    </button>
                </div>
            );
        }

        function MainMenu({ onNavigate, show }) {
            return (
                <div className={`min-h-screen w-full bg-[#FDFBF7] flex flex-col items-center justify-center p-6 font-main pb-32 transition-opacity duration-700 ease-in-out ${show ? 'opacity-100' : 'opacity-0'}`}>
                    <div className="max-w-md w-full space-y-8">
                        <div className="text-center space-y-2">
                            <h1 className="text-5xl font-bold text-slate-700 tracking-tight mb-2">情緒調控工具</h1>
                            <p className="text-xl text-slate-500">選擇適合你的練習</p>
                        </div>

                        <div className="space-y-4">
                            <button 
                                onClick={() => onNavigate('meter')}
                                className="w-full bg-white hover:bg-orange-50 active:bg-orange-100 border-2 border-orange-100 hover:border-orange-200 p-6 rounded-3xl shadow-sm hover:shadow-md transition-all duration-300 group flex items-center gap-6"
                            >
                                <AbstractIcon type="meter" />
                                <div className="text-left">
                                    <h3 className="text-2xl font-bold text-slate-700 group-hover:text-orange-800 transition-colors">情緒溫度計</h3>
                                    <p className="text-slate-400 mt-1">覺察當下的情緒能量</p>
                                </div>
                            </button>

                            <button 
                                onClick={() => onNavigate('explorer')}
                                className="w-full bg-white hover:bg-orange-50 active:bg-orange-100 border-2 border-orange-100 hover:border-orange-200 p-6 rounded-3xl shadow-sm hover:shadow-md transition-all duration-300 group flex items-center gap-6"
                            >
                                <AbstractIcon type="search" />
                                <div className="text-left">
                                    <h3 className="text-2xl font-bold text-slate-700 group-hover:text-orange-800 transition-colors">情緒探索器</h3>
                                    <p className="text-slate-400 mt-1">辨識你的情緒</p>
                                </div>
                            </button>

                            <button 
                                onClick={() => alert('即將推出！')}
                                className="w-full bg-white/60 p-6 rounded-3xl border-2 border-slate-100 shadow-sm flex items-center gap-6 opacity-70 cursor-not-allowed"
                            >
                                <AbstractIcon type="breath" />
                                <div className="text-left">
                                    <h3 className="text-2xl font-bold text-slate-400">呼吸練習</h3>
                                    <p className="text-slate-400 mt-1">Coming Soon</p>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function EmotionMeterTool({ onBack, show }) {
            const [level, setLevel] = useState(1);

            const currentState = EMOTION_LEVELS.find(e => e.id === level) || EMOTION_LEVELS[0];

            const getGradient = (val) => {
                if (val <= 1) return 'from-green-400 to-green-200';
                if (val <= 2) return 'from-teal-400 to-teal-200';
                if (val <= 3) return 'from-blue-400 to-blue-200';
                if (val <= 4) return 'from-yellow-400 to-yellow-200';
                if (val <= 5) return 'from-indigo-500 to-indigo-300';
                if (val <= 6) return 'from-orange-600 to-orange-400';
                return 'from-red-700 to-red-500';
            };

            const currentGradient = getGradient(level);

            const getSolidColor = (val) => {
                if (val <= 1) return '#4ADE80';
                if (val <= 2) return '#2DD4BF';
                if (val <= 3) return '#60A5FA';
                if (val <= 4) return '#EAB308';
                if (val <= 5) return '#6366F1';
                if (val <= 6) return '#EA580C';
                return '#B91C1C';
            };
            const solidColor = getSolidColor(level);

            const heightPercentage = (level / 7) * 100;

            return (
                <div className={`fixed inset-0 w-full h-full flex flex-col items-center justify-center bg-gradient-to-br ${currentGradient} p-4 font-main text-slate-800 overflow-hidden transition-opacity duration-700 ease-in-out ${show ? 'opacity-100' : 'opacity-0'}`}>
                    
                    <style>{`
                        input[type=range]::-webkit-slider-thumb {
                            border: 5px solid ${solidColor};
                        }
                        input[type=range]::-moz-range-thumb {
                            border: 5px solid ${solidColor};
                        }
                    `}</style>

                    <div className="main-card-scale z-10 w-full max-w-[380px] bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl p-6 sm:p-8 flex flex-col items-center gap-6 border border-white/50 transition-transform duration-300 ease-out">
                        <h1 className="text-6xl font-bold text-slate-800 tracking-tighter">情緒溫度計</h1>
                        
                        <div className="flex flex-row w-full justify-between items-center gap-4 sm:gap-6">
                            {/* Thermometer */}
                            <div className="relative h-80 w-24 bg-slate-100 rounded-full border-4 border-slate-300 flex flex-col justify-end items-center shadow-inner overflow-hidden shrink-0">
                                <div className="absolute inset-0 z-20 flex flex-col justify-between py-4 pointer-events-none">
                                    {[...Array(7)].map((_, i) => (
                                        <div key={i} className={`w-full h-0.5 ${i === 0 || i === 6 ? 'bg-slate-400/50 w-1/2 mx-auto' : 'bg-slate-300/50 w-1/3 mx-auto'}`} />
                                    ))}
                                </div>

                                {/* Liquid */}
                                <div 
                                    className="w-full relative z-10"
                                    style={{ 
                                        height: `${heightPercentage}%`, 
                                        backgroundColor: solidColor,
                                        transition: 'height 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.5s ease'
                                    }}
                                >
                                    <div className="absolute top-0 left-0 w-full h-4 bg-white/30 rounded-t-full" />
                                </div>

                                {/* Bulb */}
                                <div 
                                    className="absolute -bottom-6 w-32 h-32 rounded-full border-4 border-slate-300 z-30 flex items-center justify-center shadow-lg transition-colors duration-500"
                                    style={{ backgroundColor: solidColor }}
                                >
                                    <span className="text-white font-bold text-7xl drop-shadow-md">{level}</span>
                                </div>
                            </div>

                            {/* Controls */}
                            <div className="flex-1 flex flex-col gap-6 items-center text-center min-w-0">
                                <div className="space-y-2 min-h-[180px] flex flex-col justify-center w-full">
                                    <div className="flex flex-col items-center">
                                        {/* Image Container with Preloading/Crossfade */}
                                        <div className="relative w-32 h-32 mb-4 drop-shadow-md">
                                            {EMOTION_LEVELS.map((emotion) => (
                                                <img 
                                                    key={emotion.id}
                                                    src={`https://github.com/epcashadhd/emotionmeter/blob/main/basic${emotion.id}.png?raw=true`} 
                                                    alt={emotion.label}
                                                    className={`absolute inset-0 w-full h-full object-contain transition-opacity duration-500 ${level === emotion.id ? 'opacity-100' : 'opacity-0'}`}
                                                    referrerPolicy="no-referrer"
                                                />
                                            ))}
                                        </div>
                                        
                                        {/* Fixed height container for text */}
                                        <div className="flex flex-col items-center h-[140px] justify-start">
                                            <h2 className="text-6xl font-bold transition-colors duration-300 whitespace-nowrap" style={{ color: solidColor }}>{currentState.label}</h2>
                                            <p className="text-slate-600 text-2xl font-bold mt-2 leading-snug whitespace-pre-wrap">{currentState.description}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full space-y-4 pt-2">
                                    <label htmlFor="emotion-slider" className="sr-only">Emotion Level</label>
                                    <div className="relative w-full h-14 flex items-center justify-center">
                                        <input
                                            id="emotion-slider"
                                            type="range"
                                            min="1"
                                            max="7"
                                            step="1"
                                            value={level}
                                            onChange={(e) => setLevel(Number(e.target.value))}
                                            className="w-full appearance-none bg-transparent focus:outline-none z-20"
                                        />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="w-full pt-4 sm:pt-6 border-t border-slate-200 flex items-center gap-3 sm:gap-4">
                            {/* Home Button (Updated Design) */}
                            <button 
                                onClick={onBack}
                                className="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center bg-white rounded-full shadow-lg border border-slate-100 hover:scale-105 active:scale-95 transition-all duration-300 shrink-0"
                                aria-label="Back to Menu"
                            >
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 sm:w-6 sm:h-6 text-slate-600">
                                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                                </svg>
                            </button>

                            <p className="flex-1 text-lg sm:text-xl md:text-2xl text-slate-600 text-center font-bold leading-relaxed whitespace-nowrap overflow-hidden text-ellipsis">
                                {level >= 6 ? "深呼吸，慢慢數到十。" : 
                                level >= 4 ? "找人說說你的煩惱。" : 
                                level >= 3 ? "聽聽音樂，轉換心情。" :
                                "保持笑容，傳遞快樂！"}
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        function EmotionWritingView({ emotion, onBack, onHome }) {
            const [mode, setMode] = useState('draw'); // 'draw', 'type', 'erase', null
            const [text, setText] = useState('');
            const [meterLevel, setMeterLevel] = useState(1);
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            
            // Canvas Logic
            useEffect(() => {
                const canvas = canvasRef.current;
                if (canvas) {
                    const initCanvas = () => {
                        // Set canvas size to match display size
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                    };

                    initCanvas();
                    // Re-init after a short delay to ensure layout is stable (e.g. after transitions)
                    setTimeout(initCanvas, 100);
                }
            }, []);

            // Handle resize
            useEffect(() => {
                const handleResize = () => {
                    const canvas = canvasRef.current;
                    if (canvas) {
                        // Save current content
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = canvas.width;
                        tempCanvas.height = canvas.height;
                        tempCanvas.getContext('2d').drawImage(canvas, 0, 0);
                        
                        // Resize
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        
                        // Restore content
                        const ctx = canvas.getContext('2d');
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.drawImage(tempCanvas, 0, 0);
                    }
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const startDrawing = (e) => {
                if (mode !== 'draw' && mode !== 'erase') return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                
                // Set style based on mode
                if (mode === 'erase') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = 20;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#334155';
                }

                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing || (mode !== 'draw' && mode !== 'erase')) return;
                // Only prevent default if we are drawing to avoid scrolling
                if (e.cancelable) e.preventDefault(); 
                
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;

                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                setIsDrawing(false);
            };

            const clearAll = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                setText('');
            };

            const toggleMode = (newMode) => {
                if (mode === newMode) {
                    setMode(null);
                } else {
                    setMode(newMode);
                }
            };

            const getSolidColor = (val) => {
                if (val <= 1) return '#4ADE80';
                if (val <= 2) return '#2DD4BF';
                if (val <= 3) return '#60A5FA';
                if (val <= 4) return '#EAB308';
                if (val <= 5) return '#6366F1';
                if (val <= 6) return '#EA580C';
                return '#B91C1C';
            };
            const solidColor = getSolidColor(meterLevel);
            const heightPercentage = (meterLevel / 7) * 100;

            return (
                <div 
                    className="fixed inset-0 w-full h-full bg-[#FDFBF7] flex flex-col z-50"
                    onClick={() => setMode(null)}
                >
                    {/* Header */}
                    <div 
                        className="w-full p-2 flex justify-between items-center bg-[#FDFBF7]/95 backdrop-blur-sm shadow-sm shrink-0"
                        onClick={(e) => e.stopPropagation()}
                    >
                        <button 
                            onClick={onBack}
                            className="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-md border border-slate-100 hover:scale-105 active:scale-95 transition-all duration-300"
                        >
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-slate-600">
                                <path d="M19 12H5M12 19l-7-7 7-7" />
                            </svg>
                        </button>
                        <h1 className="text-xl font-bold text-slate-700">記錄心情</h1>
                        <button 
                            onClick={onHome}
                            className="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-md border border-slate-100 hover:scale-105 active:scale-95 transition-all duration-300"
                        >
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-slate-600">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                <polyline points="9 22 9 12 15 12 15 22"></polyline>
                            </svg>
                        </button>
                    </div>

                    <div className="flex-1 flex flex-row p-4 gap-4 overflow-hidden">
                        {/* Left Column: Emotion + Thermometer */}
                        <div 
                            className="w-1/3 max-w-[220px] flex flex-col gap-4 items-center overflow-y-auto"
                            onClick={(e) => e.stopPropagation()}
                        >
                            {/* Emotion Image */}
                            <div className="w-full aspect-square bg-white rounded-2xl shadow-sm border-2 border-slate-100 p-2 flex items-center justify-center shrink-0">
                                <img 
                                    src={`https://github.com/epcashadhd/emotionmeter/blob/main/${emotion.type}${emotion.index}.png?raw=true`}
                                    alt="Selected Emotion"
                                    className="w-full h-full object-contain"
                                    referrerPolicy="no-referrer"
                                />
                            </div>

                            {/* Mini Thermometer */}
                            <div className="flex-1 w-full bg-white rounded-2xl shadow-sm border-2 border-slate-100 p-4 flex flex-col items-center justify-between min-h-[300px]">
                                <div className="text-slate-500 font-bold mb-2">情緒指數</div>
                                
                                <div className="flex-1 w-full flex items-center justify-center py-4">
                                    <div className="relative h-full w-12 bg-slate-100 rounded-full border-2 border-slate-300 flex flex-col justify-end items-center shadow-inner">
                                        {/* Ticks */}
                                        <div className="absolute inset-0 z-20 flex flex-col justify-between py-4 pointer-events-none">
                                            {[...Array(7)].map((_, i) => (
                                                <div key={i} className={`w-full h-0.5 ${i === 0 || i === 6 ? 'bg-slate-400/50 w-1/2 mx-auto' : 'bg-slate-300/50 w-1/3 mx-auto'}`} />
                                            ))}
                                        </div>

                                        {/* Liquid */}
                                        <div 
                                            className="w-full relative z-10 rounded-b-full"
                                            style={{ 
                                                height: `${heightPercentage}%`, 
                                                backgroundColor: solidColor,
                                                transition: 'height 0.3s ease, background-color 0.3s ease'
                                            }}
                                        >
                                            <div className="absolute top-0 left-0 w-full h-2 bg-white/30 rounded-t-full" />
                                        </div>

                                        {/* Bulb */}
                                        <div 
                                            className="absolute -bottom-5 w-16 h-16 rounded-full border-2 border-slate-300 z-30 flex items-center justify-center shadow-md transition-colors duration-300"
                                            style={{ backgroundColor: solidColor }}
                                        >
                                            <span className="text-white font-bold text-2xl drop-shadow-md">{meterLevel}</span>
                                        </div>

                                        {/* Invisible Click Area */}
                                        <div className="absolute inset-0 z-40 flex flex-col-reverse cursor-pointer">
                                            {[...Array(7)].map((_, i) => (
                                                <div 
                                                    key={i} 
                                                    className="flex-1 w-full"
                                                    onClick={() => setMeterLevel(i + 1)}
                                                />
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Right Column: Writing Box */}
                        <div 
                            className="flex-1 bg-white rounded-3xl shadow-sm border-2 border-slate-100 flex flex-col relative overflow-hidden"
                            onClick={(e) => e.stopPropagation()}
                        >
                            {/* Toolbar */}
                            <div className="absolute top-4 right-4 flex gap-2 z-20">
                                <button 
                                    onClick={() => toggleMode('draw')}
                                    className={`w-12 h-12 rounded-full flex items-center justify-center shadow-md transition-all ${mode === 'draw' ? 'bg-orange-500 text-white scale-110' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
                                    title="Draw"
                                >
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6">
                                        <path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                                    </svg>
                                </button>
                                <button 
                                    onClick={() => toggleMode('type')}
                                    className={`w-12 h-12 rounded-full flex items-center justify-center shadow-md transition-all ${mode === 'type' ? 'bg-orange-500 text-white scale-110' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
                                    title="Type"
                                >
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6">
                                        <rect x="2" y="4" width="20" height="16" rx="2" /><path d="M6 8h.001" /><path d="M10 8h.001" /><path d="M14 8h.001" /><path d="M18 8h.001" /><path d="M6 12h.001" /><path d="M10 12h.001" /><path d="M14 12h.001" /><path d="M18 12h.001" /><path d="M7 16h10" />
                                    </svg>
                                </button>
                                <button 
                                    onClick={() => toggleMode('erase')}
                                    className={`w-12 h-12 rounded-full flex items-center justify-center shadow-md transition-all ${mode === 'erase' ? 'bg-orange-500 text-white scale-110' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
                                    title="Eraser"
                                >
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6">
                                        <path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z" />
                                        <path d="M17 17L7 7" />
                                    </svg>
                                </button>
                                <button 
                                    onClick={clearAll}
                                    className="w-12 h-12 rounded-full flex items-center justify-center bg-white text-slate-500 shadow-md hover:bg-red-50 hover:text-red-500 transition-all"
                                    title="Clear All"
                                >
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6">
                                        <polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                    </svg>
                                </button>
                            </div>

                            {/* Canvas Layer */}
                            <canvas
                                ref={canvasRef}
                                className={`absolute inset-0 w-full h-full touch-none cursor-crosshair ${mode === 'draw' || mode === 'erase' ? 'z-10' : 'z-0 pointer-events-none'}`}
                                onMouseDown={startDrawing}
                                onMouseMove={draw}
                                onMouseUp={stopDrawing}
                                onMouseLeave={stopDrawing}
                                onTouchStart={startDrawing}
                                onTouchMove={draw}
                                onTouchEnd={stopDrawing}
                            />

                            {/* Textarea Layer */}
                            <textarea
                                value={text}
                                onChange={(e) => setText(e.target.value)}
                                placeholder="在這裡寫下你的想法..."
                                className={`absolute inset-0 w-full h-full bg-transparent p-6 text-xl leading-relaxed resize-none focus:outline-none ${mode === 'type' ? 'z-10' : 'z-0 pointer-events-none opacity-50'}`}
                            />
                        </div>
                    </div>
                </div>
            );
        }

        function EmotionExplorerTool({ onBack, show }) {
            const [selectedEmotion, setSelectedEmotion] = useState(null);
            const [isCompactLayout, setIsCompactLayout] = useState(false);
            const [step, setStep] = useState('select'); // 'select' | 'write'

            useEffect(() => {
                const checkLayout = () => {
                    // Check for mobile landscape (typically short height) OR tablet portrait (narrow width)
                    const isLandscapeMobile = window.matchMedia("(max-height: 500px) and (orientation: landscape)").matches;
                    // Include all portrait devices up to 1024px (covers mobile & tablet portrait)
                    const isPortraitMobileOrTablet = window.matchMedia("(max-width: 1024px) and (orientation: portrait)").matches;
                    setIsCompactLayout(isLandscapeMobile || isPortraitMobileOrTablet);
                };
                
                checkLayout();
                window.addEventListener('resize', checkLayout);
                return () => window.removeEventListener('resize', checkLayout);
            }, []);

            // Data generation
            const positiveEmotions = Array.from({ length: 13 }, (_, i) => ({ id: `p${i+1}`, type: 'positive', index: i + 1 }));
            const negativeEmotions = Array.from({ length: 13 }, (_, i) => ({ id: `n${i+1}`, type: 'negative', index: i + 1 }));

            let rows = [];
            if (isCompactLayout) {
                // Mobile Landscape / Tablet Portrait: 3, 2, 3, 2, 3 pattern (Total 13)
                rows = [
                    positiveEmotions.slice(0, 3),
                    positiveEmotions.slice(3, 5),
                    positiveEmotions.slice(5, 8),
                    positiveEmotions.slice(8, 10),
                    positiveEmotions.slice(10, 13),
                    negativeEmotions.slice(0, 3),
                    negativeEmotions.slice(3, 5),
                    negativeEmotions.slice(5, 8),
                    negativeEmotions.slice(8, 10),
                    negativeEmotions.slice(10, 13)
                ];
            } else {
                // Default: 7, 6 pattern
                rows = [
                    positiveEmotions.slice(0, 7),
                    positiveEmotions.slice(7, 13),
                    negativeEmotions.slice(0, 7),
                    negativeEmotions.slice(7, 13)
                ];
            }

            const handleEmotionClick = (e, id) => {
                e.stopPropagation();
                setSelectedEmotion(id);
            };

            const handleNext = (e) => {
                e.stopPropagation();
                if (selectedEmotion) {
                    setStep('write');
                }
            };

            // Find selected emotion data
            const allEmotions = [...positiveEmotions, ...negativeEmotions];
            const selectedEmotionData = allEmotions.find(e => e.id === selectedEmotion);

            if (step === 'write' && selectedEmotionData) {
                return (
                    <EmotionWritingView 
                        emotion={selectedEmotionData} 
                        onBack={() => setStep('select')}
                        onHome={onBack}
                    />
                );
            }

            let globalIndex = 0;

            return (
                <div 
                    className={`fixed inset-0 w-full h-full bg-[#FDFBF7] flex flex-col transition-opacity duration-700 ease-in-out ${show ? 'opacity-100' : 'opacity-0'}`}
                    onClick={() => setSelectedEmotion(null)}
                >
                    {/* Header */}
                    <div className="w-full p-2 flex justify-between items-center z-20 shrink-0 bg-[#FDFBF7]/95 backdrop-blur-sm shadow-sm">
                        {/* Home Button (Top Left) */}
                        <button 
                            onClick={(e) => { e.stopPropagation(); onBack(); }}
                            className="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-md border border-slate-100 hover:scale-105 active:scale-95 transition-all duration-300"
                        >
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-slate-600">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                <polyline points="9 22 9 12 15 12 15 22"></polyline>
                            </svg>
                        </button>

                        <h1 className="text-xl md:text-2xl font-bold text-slate-700 tracking-tight">情緒探索器</h1>

                        {/* Next Button (Top Right) */}
                        <div className="w-10 h-10 relative">
                            <button 
                                onClick={handleNext}
                                className={`absolute inset-0 w-full h-full flex items-center justify-center bg-orange-500 rounded-full shadow-md border-2 border-orange-400 hover:bg-orange-600 transition-all duration-500 transform ${selectedEmotion ? 'opacity-100 scale-100 rotate-0' : 'opacity-0 scale-50 rotate-180 pointer-events-none'}`}
                            >
                                <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                    <polyline points="12 5 19 12 12 19"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>

                    {/* Content */}
                    <div className="flex-1 flex flex-col items-center gap-2 sm:gap-3 p-2 overflow-y-auto pb-4 pt-4">
                        {rows.map((row, rowIndex) => (
                            <div key={rowIndex} className={`flex flex-wrap justify-center gap-2 sm:gap-4 xl:gap-6 ${rowIndex === 1 || (isCompactLayout && rowIndex === 3) ? 'mb-4 sm:mb-6' : ''} ${isCompactLayout && rowIndex === 4 ? 'mb-16' : ''}`}>
                                {row.map((emotion) => {
                                    const delay = 100 + (globalIndex * 40); // Staggered delay
                                    globalIndex++;
                                    
                                    return (
                                        <button
                                            key={emotion.id}
                                            onClick={(e) => handleEmotionClick(e, emotion.id)}
                                            style={{
                                                animation: `fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards`,
                                                animationDelay: `${delay}ms`,
                                                opacity: 0 // Start invisible
                                            }}
                                            className={`relative group transition-all duration-300 ${
                                                selectedEmotion === emotion.id 
                                                    ? 'scale-110 z-10' 
                                                    : 'hover:scale-105 opacity-90 hover:opacity-100'
                                            }`}
                                        >
                                            <div className={`${isCompactLayout ? 'w-24 h-24 sm:w-32 sm:h-32' : 'w-20 h-20 sm:w-24 sm:h-24'} md:w-32 md:h-32 xl:w-36 xl:h-36 2xl:w-40 2xl:h-40 rounded-2xl bg-white shadow-sm border-2 flex items-center justify-center overflow-hidden transition-all duration-300 ${
                                                selectedEmotion === emotion.id 
                                                    ? 'border-orange-400 shadow-orange-200 shadow-xl ring-4 ring-orange-100' 
                                                    : 'border-slate-100 group-hover:border-orange-200'
                                            }`}>
                                                <img 
                                                    src={`https://github.com/epcashadhd/emotionmeter/blob/main/${emotion.type}${emotion.index}.png?raw=true`}
                                                    alt={`${emotion.type} ${emotion.index}`}
                                                    className="w-[90%] h-[90%] object-contain"
                                                    referrerPolicy="no-referrer"
                                                />
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('menu'); // 'menu' or 'meter'
            const [transitionState, setTransitionState] = useState('idle'); // 'idle', 'fading-out', 'mounting', 'fading-in'

            // Preload images for smoother experience
            useEffect(() => {
                const preloadImages = async () => {
                    const imageUrls = [
                        LOGO_URL,
                        // Basic emotions (1-7)
                        ...Array.from({ length: 7 }, (_, i) => `https://github.com/epcashadhd/emotionmeter/blob/main/basic${i+1}.png?raw=true`),
                        // Positive emotions (1-13)
                        ...Array.from({ length: 13 }, (_, i) => `https://github.com/epcashadhd/emotionmeter/blob/main/positive${i+1}.png?raw=true`),
                        // Negative emotions (1-13)
                        ...Array.from({ length: 13 }, (_, i) => `https://github.com/epcashadhd/emotionmeter/blob/main/negative${i+1}.png?raw=true`)
                    ];

                    imageUrls.forEach(url => {
                        const img = new Image();
                        img.src = url;
                    });
                };
                
                // Start preloading after a short delay to allow initial render
                const timer = setTimeout(preloadImages, 1000);
                return () => clearTimeout(timer);
            }, []);

            const handleNavigate = (target) => {
                setTransitionState('fading-out');
                setTimeout(() => {
                    setView(target);
                    setTransitionState('mounting');
                    
                    // Small delay to ensure mount happens before fade-in starts
                    setTimeout(() => {
                        setTransitionState('fading-in');
                        setTimeout(() => {
                            setTransitionState('idle');
                        }, 700); // Match fade-in duration
                    }, 50);
                }, 700); // Match fade-out duration
            };

            const show = transitionState === 'idle' || transitionState === 'fading-in';

            return (
                <React.Fragment>
                    {view === 'menu' && (
                        <MainMenu 
                            onNavigate={handleNavigate} 
                            show={show} 
                        />
                    )}
                    
                    {view === 'meter' && (
                        <EmotionMeterTool 
                            onBack={() => handleNavigate('menu')} 
                            show={show}
                        />
                    )}

                    {view === 'explorer' && (
                        <EmotionExplorerTool 
                            onBack={() => handleNavigate('menu')} 
                            show={show}
                        />
                    )}
                    
                    {/* Floating logo only on menu */}
                    <FloatingLogo visible={view === 'menu'} show={show} />
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
